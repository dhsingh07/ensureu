# ==========================================
# File Storage Configuration
# ==========================================
# Storage type: LOCAL or S3
storage.type=LOCAL

# Local storage configuration
storage.local.base-path=/var/ensureu/uploads
storage.local.base-url=http://localhost:8282/api/files

# AWS S3 configuration (used when storage.type=S3)
storage.s3.bucket-name=ensureu-assets
storage.s3.region=ap-south-1
storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
storage.s3.base-url=
storage.s3.prefix=uploads

